<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">

<title>Travel Tools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:400px;width:100%}

.card:active{transform:scale(.97)}
.icon{font-size:48px;margin-bottom:12px}
.title{font-size:24px;font-weight:800;margin-bottom:6px}
.desc{font-size:16px;color:#666;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <a class="card" href="yellowstone.html">
    <div class="icon">🏔️</div>
    <div class="title">黄石助手</div>
    <div class="desc">大提顿 & 黄石 10天自驾旅行助手</div>
  </a>
  <a class="card" href="dmv.html">
    <div class="icon">🚗</div>
    <div class="title">驾照助手</div>
    <div class="desc">加州 DMV 驾照笔试备考 (300+ 题)</div>
  </a>
</div>
</body>
</html>
